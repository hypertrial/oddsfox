<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>oddsfox</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ef;
      --ink: #1f2933;
      --muted: #667085;
      --line: #d9ded8;
      --panel: #ffffff;
      --panel-soft: #eef6f3;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --warn: #b45309;
      --bad: #b42318;
      --good: #087443;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    a { color: var(--accent-strong); }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.9em;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }
    .topbar {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .brand { display: flex; flex-direction: column; gap: 2px; }
    .brand strong { font-size: 18px; }
    .brand span { color: var(--muted); font-size: 12px; }
    nav { display: flex; gap: 8px; flex-wrap: wrap; }
    nav a {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px 10px;
      color: var(--ink);
      text-decoration: none;
      background: var(--panel);
    }
    nav a:hover { border-color: var(--accent); color: var(--accent-strong); }
    main { padding: 24px 0 40px; }
    .status {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .metric, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
    }
    .metric { padding: 14px; }
    .metric span { display: block; color: var(--muted); font-size: 12px; }
    .metric strong { display: block; margin-top: 6px; font-size: 22px; }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr);
      gap: 16px;
      align-items: start;
    }
    .panel { overflow: hidden; }
    .panel h2 {
      margin: 0;
      padding: 14px 16px;
      font-size: 15px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }
    .panel-body { padding: 14px 16px; }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      background: #fafafa;
    }
    tr:last-child td { border-bottom: 0; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .muted { color: var(--muted); }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 650;
      background: #eceff3;
      color: #344054;
      white-space: nowrap;
    }
    .badge.complete { background: #e6f4ec; color: var(--good); }
    .badge.failed { background: #fee4e2; color: var(--bad); }
    .badge.started { background: #fff4df; color: var(--warn); }
    .list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .list li {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      background: #fff;
    }
    .issue { border-left: 3px solid var(--warn); }
    .command {
      display: block;
      overflow-wrap: anywhere;
      color: var(--accent-strong);
    }
    .empty {
      margin: 0;
      color: var(--muted);
      padding: 12px 0;
    }
    .market-question { max-width: 620px; }
    @media (max-width: 820px) {
      .topbar { align-items: flex-start; flex-direction: column; padding: 14px 0; }
      .status, .grid { grid-template-columns: 1fr; }
      th.optional, td.optional { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="shell topbar">
      <div class="brand">
        <strong>oddsfox</strong>
        <span>Local prediction-market analytics lake</span>
      </div>
      <nav aria-label="Primary">
        <a href="#usage">Usage</a>
        <a href="#markets">Markets</a>
        <a href="/health">Health API</a>
        <a href="/metrics/liquidity">Liquidity API</a>
      </nav>
    </div>
  </header>

  <main class="shell">
    <section id="usage" class="status" aria-label="Usage summary">
      <div class="metric"><span>Completed runs</span><strong id="completed">0</strong></div>
      <div class="metric"><span>Failed / incomplete</span><strong id="problems">0</strong></div>
      <div class="metric"><span>Rows written</span><strong id="rows">0</strong></div>
      <div class="metric"><span>Last success</span><strong id="last-success">none</strong></div>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>Recent Toolkit Runs</h2>
        <div class="panel-body" id="runs-panel">
          <p class="empty">Loading usage...</p>
        </div>
      </div>

      <div class="panel">
        <h2>Lake Health</h2>
        <div class="panel-body">
          <ul class="list" id="issues"></ul>
          <p class="empty" id="issues-empty">Loading health...</p>
        </div>
        <h2>Suggested Commands</h2>
        <div class="panel-body">
          <ul class="list" id="suggestions"></ul>
        </div>
      </div>
    </section>

    <section id="markets" class="panel" style="margin-top: 16px;">
      <h2>Top Markets</h2>
      <div class="panel-body" id="markets-panel">
        <p class="empty">Loading markets...</p>
      </div>
    </section>
  </main>

  <script>
    const nf = new Intl.NumberFormat();
    const dtf = new Intl.DateTimeFormat(undefined, {
      month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit'
    });

    function text(tag, value, className) {
      const el = document.createElement(tag);
      if (className) el.className = className;
      el.textContent = value == null || value === '' ? 'n/a' : String(value);
      return el;
    }

    function formatTime(value) {
      return value ? dtf.format(new Date(value)) : 'none';
    }

    function setText(id, value) {
      document.getElementById(id).textContent = value;
    }

    function statusBadge(status) {
      const badge = text('span', status, 'badge ' + status);
      return badge;
    }

    function renderUsage(data) {
      const summary = data.summary || {};
      setText('completed', nf.format(summary.completed || 0));
      setText('problems', nf.format((summary.failed || 0) + (summary.incomplete || 0)));
      setText('rows', nf.format(summary.rows_written || 0));
      setText('last-success', formatTime(summary.last_success_at));

      const runs = data.runs || [];
      const runsPanel = document.getElementById('runs-panel');
      runsPanel.replaceChildren();
      if (!runs.length) {
        runsPanel.appendChild(text('p', 'No run history yet. Run quickstart or a sync command to populate usage.', 'empty'));
      } else {
        const table = document.createElement('table');
        table.innerHTML = '<thead><tr><th>Status</th><th>Command</th><th>Started</th><th class="optional">Duration</th><th class="num">Rows</th></tr></thead>';
        const body = document.createElement('tbody');
        runs.forEach(run => {
          const tr = document.createElement('tr');
          const status = document.createElement('td');
          status.appendChild(statusBadge(run.status));
          tr.appendChild(status);
          tr.appendChild(text('td', run.command));
          tr.appendChild(text('td', formatTime(run.started_at)));
          tr.appendChild(text('td', run.duration_seconds == null ? '' : run.duration_seconds + 's', 'optional'));
          tr.appendChild(text('td', nf.format(run.rows_written || 0), 'num'));
          body.appendChild(tr);
        });
        table.appendChild(body);
        runsPanel.appendChild(table);
      }

      const issueList = document.getElementById('issues');
      const issuesEmpty = document.getElementById('issues-empty');
      issueList.replaceChildren();
      (data.issues || []).forEach(issue => {
        const li = text('li', issue, 'issue');
        issueList.appendChild(li);
      });
      issuesEmpty.textContent = issueList.children.length ? '' : 'No lake issues reported.';

      const suggestions = document.getElementById('suggestions');
      suggestions.replaceChildren();
      (data.suggestions || []).forEach(command => {
        const li = document.createElement('li');
        li.appendChild(text('code', command, 'command'));
        suggestions.appendChild(li);
      });
    }

    function renderMarkets(data) {
      const markets = (data.markets || []).slice(0, 12);
      const panel = document.getElementById('markets-panel');
      panel.replaceChildren();
      if (!markets.length) {
        panel.appendChild(text('p', 'No markets found. Run sync markets or quickstart first.', 'empty'));
        return;
      }
      const table = document.createElement('table');
      table.innerHTML = '<thead><tr><th>Question</th><th>Active</th><th class="num">Volume 24h</th><th>API</th></tr></thead>';
      const body = document.createElement('tbody');
      markets.forEach(market => {
        const tr = document.createElement('tr');
        tr.appendChild(text('td', market.question || market.market_id, 'market-question'));
        tr.appendChild(text('td', market.active));
        tr.appendChild(text('td', market.volume_24h == null ? '' : nf.format(market.volume_24h), 'num'));
        const linkCell = document.createElement('td');
        const link = text('a', 'view');
        link.href = '/markets/' + encodeURIComponent(market.market_id);
        linkCell.appendChild(link);
        tr.appendChild(linkCell);
        body.appendChild(tr);
      });
      table.appendChild(body);
      panel.appendChild(table);
    }

    fetch('/usage').then(r => r.json()).then(renderUsage).catch(err => {
      document.getElementById('runs-panel').replaceChildren(text('p', 'Usage unavailable: ' + err, 'empty'));
    });
    fetch('/markets').then(r => r.json()).then(renderMarkets).catch(err => {
      document.getElementById('markets-panel').replaceChildren(text('p', 'Markets unavailable: ' + err, 'empty'));
    });
  </script>
</body>
</html>
