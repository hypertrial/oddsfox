name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  POLYMARKET_MINUTELY_ODDS_SCHEDULE_ENABLED: "false"
  POLYMARKET_MINUTELY_ODDS_LIVE_SCHEDULE_ENABLED: "false"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install package and dev tools
        run: uv sync --extra dev

      - name: Lint
        run: uv run make lint

      - name: Tests
        run: uv run make test

      - name: dbt integration smoke
        run: uv run make integration-dbt

      - name: Docs
        run: uv run make docs-check

      - name: dbt parse
        run: uv run make dbt-parse

      - name: dbt build
        run: uv run make dbt-build-ci
